name: keycloak-cloudfront-auth

services:
  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-26.2}
    container_name: kc-cloudfront-auth_keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      #- KC_HOSTNAME=kc-cloudfront-auth_keycloak
      - KC_PROXY_HEADERS=xforwarded
      #- KC_FEATURES=preview
      - KC_HTTP_PORT=80
      - KC_HEALTH_ENABLED=true
      #- KC_LOG_LEVEL=INFO,fr.julm:DEBUG
    ports:
      - "${KC_HOST_PORT:-8080}:80"
    command:
      - start-dev
    volumes:
      - keycloak-providers:/opt/keycloak/providers
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:80"]
    #   interval: 5s
    #   timeout: 2s
    #   retries: 15

  configurator:
    image: docker:cli
    volumes:
      - ./mounts/configurator/providers:/mnt/providers:ro
      - ./mounts/configurator/scripts:/mnt/scripts:ro
      - keycloak-providers:/mnt/keycloak-providers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - KEYCLOAK_VERSION=${KEYCLOAK_VERSION:-26.2}
      - PROVIDER_JAR_URL=${PROVIDER_JAR_URL:-}
    command: sh /mnt/scripts/configure.sh

  # openresty:
