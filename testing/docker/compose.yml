  #     - KC_CF_SIGN_KEY_ID=ABCDEFGH
  #     - KC_URL=http://localhost:${KC_HOST_PORT:-8080}
  #     - APP_URL=
  #   ports:
  #     - "${OPENRESTY_HOST_PORT:-8081}:80"
  #   volumes:
  #     - ./mounts/openresty/files/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
