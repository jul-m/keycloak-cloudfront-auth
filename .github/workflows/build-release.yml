name: Build & Release

on:
  workflow_dispatch:
    inputs:
      kc_versions:
        description: 'Keycloak versions to build (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string
      tag:
        description: 'Tag (ex: 1.0.0, dev)'
        required: true
        default: 'dev'
        type: string
      latest:
        description: 'latest'
        required: false
        default: false
        type: boolean
      build_demo_image:
        description: 'Build demo Docker image'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  # Job 1: Build tous les JARs
  build-jars:
    runs-on: ubuntu-24.04
    name: Build JAR Files
    outputs:
      versions: ${{ steps.extract.outputs.versions }}
      jars: ${{ steps.discover.outputs.jars }}
      build_demo_image: ${{ inputs.build_demo_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build provider JAR(s) for requested Keycloak versions
        id: build_jars
        run: |
          set -euo pipefail
          KC_INPUT="${{ inputs.kc_versions }}"
          if [ -z "$KC_INPUT" ]; then
            KC_INPUT="all"
          fi
          # Convert comma-separated to space-separated
          KC_ARGS=$(echo "$KC_INPUT" | tr ',' ' ')
          TAG_INPUT="${{ inputs.tag }}"
          LATEST_FLAG="${{ inputs.latest }}"
          if [ "$LATEST_FLAG" = "true" ] || [ "$LATEST_FLAG" = "True" ]; then
            EXTRA_ARG="FINAL"
          else
            EXTRA_ARG="$TAG_INPUT"
          fi
          echo "Running: ./run.sh build $KC_ARGS $EXTRA_ARG"
          ./run.sh build $KC_ARGS $EXTRA_ARG
          echo "build_done=true" >> $GITHUB_OUTPUT || true

      - name: Discover built JARs and KC versions
        id: discover
        run: |
          set -euo pipefail
          shopt -s nullglob || true
          jars=( dist/keycloak-cloudfront-auth-*-KC*.jar )
          if [ "${#jars[@]}" -eq 0 ]; then
            echo "No built JARs found in dist/" >&2
            ls -la dist/ || true
            exit 1
          fi
          echo "Found JARs:"
          for j in "${jars[@]}"; do
            echo "  $j"
          done

          # Extract versions like 26.3 from filenames and collect unique
          versions=()
          for j in "${jars[@]}"; do
            v=$(basename "$j" | sed -n 's/.*-KC\([0-9]\+[.][0-9]\+\).*/\1/p')
            if [ -n "$v" ]; then
              versions+=("$v")
            fi
          done
          # unique
          IFS=$'\n' unique_versions=($(printf "%s\n" "${versions[@]}" | sort -u -V))
          unset IFS
          echo "versions=${unique_versions[*]}" >> "$GITHUB_OUTPUT"
          echo "jars=${jars[*]}" >> "$GITHUB_OUTPUT"

      - name: Extract KC versions as JSON for matrix
        id: extract
        run: |
          set -euo pipefail
          versions=()
          for jar in dist/keycloak-cloudfront-auth-*-KC*.jar; do
            if [ -f "$jar" ]; then
              v=$(basename "$jar" | sed -n 's/.*-KC\([0-9]\+[.][0-9]\+\).*/\1/p')
              if [ -n "$v" ]; then
                versions+=("$v")
              fi
            fi
          done
          # Unique et trié
          IFS=$'\n' unique_versions=($(printf "%s\n" "${versions[@]}" | sort -u -V))
          unset IFS
          # Convertir en JSON (utilise python3 présent sur les runners Ubuntu)
          json_array=$(printf '%s\n' "${unique_versions[@]}" | python3 -c 'import sys,json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))')
          echo "versions=$json_array" >> $GITHUB_OUTPUT
          echo "Found KC versions: ${unique_versions[*]}"

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-cloudfront-auth-jars
          path: dist/keycloak-cloudfront-auth-*-KC*.jar
          retention-days: 1

  # Job 2: Matrice — build par-arch (amd64, arm64) et export de cache local (pas de push)
  build-docker-images:
    name: Build Docker Image Cache (KC${{ matrix.kc_version }} - ${{ matrix.platform }})
    needs: [build-jars]
    if: ${{ needs.build-jars.outputs.build_demo_image == 'true' }}
    strategy:
      matrix:
        kc_version: ${{ fromJSON(needs.build-jars.outputs.versions) }}
        platform: [amd64, arm64]
      fail-fast: false
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: keycloak-cloudfront-auth-jars
          path: dist/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          IMAGE_NAME="keycloak-cloudfront-auth-demo"
          KC_VERSION="${{ matrix.kc_version }}"
          PLATFORM="${{ matrix.platform }}"
          TAG_INPUT="${{ inputs.tag }}"
          LATEST_FLAG="${{ inputs.latest }}"

          # Export build cache localement for this version+platform
          CACHE_DIR="cache/${KC_VERSION}-${PLATFORM}"
          mkdir -p "$CACHE_DIR"

          echo "Building cache for Keycloak $KC_VERSION on $PLATFORM"

          # Use run.sh to call docker-build and export cache locally (no push)
          ./run.sh docker-build demo "$KC_VERSION" -- --platform=linux/${PLATFORM} \
            --cache-to type=local,dest=$CACHE_DIR,mode=max \
            --cache-repo "" \
            --load
          
          # Le buildx ci-dessus a déjà poussé une image multi-arch (manifest) pour ${TAG1}
          # Upload cache directory as artifact for the final job
          ART_NAME="build-cache-${KC_VERSION}-${PLATFORM}"
        
      - name: Upload build cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ format('build-cache-{0}-{1}', matrix.kc_version, matrix.platform) }}
          path: cache/${{ matrix.kc_version }}-${{ matrix.platform }}
          retention-days: 1

  # Job 3: Finalisation - création des manifests multi-arch et release
  finalize-release:
    runs-on: ubuntu-24.04
    name: Finalize Release
    needs: [build-jars, build-docker-images]
    if: always() && needs.build-jars.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: keycloak-cloudfront-auth-jars
          path: dist/

      - name: Log in to GitHub Container Registry
        if: ${{ needs.build-jars.outputs.build_demo_image == 'true' && needs.build-docker-images.result == 'success' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        if: ${{ needs.build-jars.outputs.build_demo_image == 'true' && needs.build-docker-images.result == 'success' }}
        uses: docker/setup-buildx-action@v3

      - name: Download build cache artifacts
        if: ${{ needs.build-jars.outputs.build_demo_image == 'true' && needs.build-docker-images.result == 'success' }}
        run: |
          set -euo pipefail
          mkdir -p cache
          VERSIONS_JSON='${{ needs.build-jars.outputs.versions }}'
          IFS=' ' read -r -a VERSIONS <<< "$(echo "$VERSIONS_JSON" | python3 -c 'import sys,json; print(" ".join(json.load(sys.stdin)))')"
          for ver in "${VERSIONS[@]}"; do
            for arch in amd64 arm64; do
              ART_NAME="build-cache-${ver}-${arch}"
              echo "Downloading artifact $ART_NAME"
              # download via actions/download-artifact is simpler, but we use curl fallback
              # Use the action instead
            done
          done

      - name: Download all build cache artifacts
        if: ${{ needs.build-jars.outputs.build_demo_image == 'true' && needs.build-docker-images.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          path: cache/

      - name: Set up QEMU and Buildx for final multi-arch push
        if: ${{ needs.build-jars.outputs.build_demo_image == 'true' && needs.build-docker-images.result == 'success' }}
        uses: docker/setup-buildx-action@v3

      - name: Final multi-arch build and push
        if: ${{ needs.build-jars.outputs.build_demo_image == 'true' && needs.build-docker-images.result == 'success' }}
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          IMAGE_NAME="keycloak-cloudfront-auth-demo"
          TAG_INPUT="${{ inputs.tag }}"
          LATEST_FLAG="${{ inputs.latest }}"

          VERSIONS_JSON='${{ needs.build-jars.outputs.versions }}'
          IFS=' ' read -r -a VERSIONS <<< "$(echo "$VERSIONS_JSON" | python3 -c 'import sys,json; print(" ".join(json.load(sys.stdin)))')"

          for ver in "${VERSIONS[@]}"; do
            TAG_BASE="KC${ver}-${TAG_INPUT}"
            TAGS="$TAG_BASE"
            if [ "$LATEST_FLAG" = "true" ] || [ "$LATEST_FLAG" = "True" ]; then
              TAGS="$TAGS KC${ver}-latest"
            fi

            # Use local cache directories as cache-from for buildx
            CACHE_AMD="cache/${ver}-amd64"
            CACHE_ARM="cache/${ver}-arm64"

            echo "Final buildx push for $TAG_BASE using local caches"
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag ghcr.io/${OWNER}/${IMAGE_NAME}:${TAG_BASE} \
              --tag ghcr.io/${OWNER}/${IMAGE_NAME}:${TAG_BASE} \
              --cache-from type=local,src=${CACHE_AMD} \
              --cache-from type=local,src=${CACHE_ARM} \
              --push \
              docker/demo
          done

      - name: Create GitHub release for tag (includes all built JARs)
        id: create_release
        uses: comnoco/create-release-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.tag }}
          release_name: ${{ inputs.tag }}
          body: |
            Automated release for keycloak-cloudfront-auth.
            Keycloak versions included: ${{ needs.build-jars.outputs.versions }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: ${{ ! inputs.latest }}

      - name: Upload provider JARs to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          UPLOAD_URL='${{ steps.create_release.outputs.upload_url }}'
          # UPLOAD_URL contains a templated {?name,label} suffix; strip it for direct use
          UPLOAD_URL_BASE="${UPLOAD_URL%%{*}"
          
          # Upload all JAR files from dist/
          for j in dist/keycloak-cloudfront-auth-*-KC*.jar; do
            if [ -f "$j" ]; then
              filename=$(basename "$j")
              echo "Uploading $j as $filename to release"
              curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/java-archive" --data-binary @"$j" "${UPLOAD_URL_BASE}?name=${filename}"
            fi
          done

      - name: Output published image
        if: ${{ needs.build-jars.outputs.build_demo_image == 'true' && needs.build-docker-images.result == 'success' }}
        run: |
          OWNER="${{ github.repository_owner }}"
          IMAGE_NAME="keycloak-cloudfront-auth-demo"
          
          # Déterminer la version KC la plus récente
          IFS=' ' read -r -a VERSIONS <<< "${{ needs.build-jars.outputs.versions }}"
          NEWEST=$(printf "%s\n" "${VERSIONS[@]}" | sort -V | tail -n1)
          
          echo "published=ghcr.io/${OWNER}/${IMAGE_NAME}:KC${NEWEST}-${{ inputs.tag }}" >> $GITHUB_OUTPUT
