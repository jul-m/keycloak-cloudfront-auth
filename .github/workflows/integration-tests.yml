name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      keycloak_versions:
        description: 'Keycloak versions to test (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string

env:
  MAVEN_OPTS: -Xmx1024m

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        keycloak-version: ['23', '24', '25', '26']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Start Docker services
      run: docker info
    
    - name: Build extension for Keycloak ${{ matrix.keycloak-version }}
      run: |
        chmod +x build.sh
        ./build.sh ${{ matrix.keycloak-version }} SNAPSHOT
    
    - name: Verify build artifacts
      run: |
        ls -la dist/
        if [ ! -f dist/keycloak-cloudfront-auth-*KC${{ matrix.keycloak-version }}*.jar ]; then
          echo "❌ Build artifact not found for Keycloak ${{ matrix.keycloak-version }}"
          exit 1
        else
          echo "✅ Build artifact found for Keycloak ${{ matrix.keycloak-version }}"
        fi
    
    - name: Run Integration Tests on Keycloak ${{ matrix.keycloak-version }}
      run: |
        chmod +x test-integration.sh
        ./test-integration.sh ${{ matrix.keycloak-version }}
      env:
        TESTCONTAINERS_RYUK_DISABLED: true
    
    - name: Cleanup Docker containers
      if: always()
      run: |
        docker-compose -f src/it/resources/docker-compose-test.yml down -v --remove-orphans || true
        docker system prune -f || true
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-keycloak-${{ matrix.keycloak-version }}
        path: |
          target/failsafe-reports/
          target/surefire-reports/
        retention-days: 7

  test-summary:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    
    steps:
    - name: Test Summary
      run: |
        echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Keycloak Version | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------------------|--------|" >> $GITHUB_STEP_SUMMARY
        
        for version in 23 24 25 26; do
          if [[ "${{ needs.build-and-test.result }}" == "success" ]]; then
            echo "| ${version} | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ${version} | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
        done
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Workflow Status: ${{ needs.build-and-test.result }}" >> $GITHUB_STEP_SUMMARY
