<!DOCTYPE html>
<html>
<head>
    <title>Redirect to authentication service...</title>
    <style type="text/css">
        body {
            font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: silver;
        }
    </style>
    <meta id="refresh-meta" http-equiv="refresh" content="{{redirectFallbackDelay}}; URL={{authUrl}}" />
</head>
<body>
    <noscript>
        <h5>JavaScript is required. If you cannot enable JavaScript, please <a href="{{authUrl}}">click here</a> to continue.</h5>
    </noscript>
    <p><i>Redirect to authentication service...</i> <a href="{{authUrl}}" id="redirect-link">Click here if the page doesn't automatically redirect.</a></p>
    <script>
        var currentUrl = window.location.href;
        var redirectUrl = '{{authUrl}}&original_uri=' + encodeURIComponent(currentUrl);
        var redirectDelay = parseInt("{{redirectDelay}}") * 1000;
        document.getElementById("redirect-link").href = redirectUrl;
        document.getElementById("refresh-meta").content = "{{redirectFallbackDelay}}; URL=" + redirectUrl;
        setTimeout(() => {  window.location.href = redirectUrl; }, redirectDelay);
    </script>
</body>
</html>
